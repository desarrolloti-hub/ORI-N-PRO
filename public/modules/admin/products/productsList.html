<div class="orien-banner">
  <div class="orien-banner-overlay"></div>
  <div class="orien-banner-content">
    <h1 class="orien-banner-title">Lista de productos</h1>
    <p class="orien-banner-subtitle">
      Gestión completa de tu catálogo de productos
    </p>
  </div>
</div>

<div class="orien-section">
  <div class="orien-admin-list-header">
    <a href="/adminDashboard" class="orien-admin-nav-link" data-link>
      <i class="fas fa-arrow-left"></i> Panel de Control
    </a>
    <a href="/productsCreate" class="orien-btn orien-btn-primary" data-link>
      <i class="fas fa-plus"></i> Agregar Producto
    </a>
  </div>

  <div class="orien-admin-search-bar">
    <div class="orien-admin-search-input">
      <i class="fas fa-search"></i>
      <input
        type="text"
        class="orien-input"
        id="searchProducts"
        placeholder="Buscar productos..."
      />
    </div>
  </div>

  <div class="orien-table-container">
    <table class="orien-table" id="productsTable">
      <thead>
        <tr>
          <th>Imagen</th>
          <th>Producto</th>
          <th>Características</th>
          <th>Precio</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5" style="text-align: center; padding: 40px">
            <div class="orien-spinner"></div>
            <p>Cargando productos...</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Contenedor de paginación -->
  <div id="paginationControls" class="orien-pagination"></div>

  <div class="orien-product-stats" id="productsCount">
    Cargando productos...
  </div>
</div>
