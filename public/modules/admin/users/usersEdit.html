<div class="orien-banner">
  <div class="orien-banner-overlay"></div>
  <div class="orien-banner-content">
    <h1 class="orien-banner-title">Editar Usuario</h1>
    <p class="orien-banner-subtitle">Modifica la información del usuario</p>
  </div>
</div>

<div class="orien-admin-users-edit">
  <div class="orien-admin-edit-container">
    <div class="orien-admin-edit-nav">
      <div class="orien-admin-edit-nav-left">
        <a href="/adminDashboard" class="orien-admin-nav-link" data-link>
          <i class="fas fa-arrow-left"></i> Dashboard
        </a>
        <a href="/usersList" class="orien-admin-nav-link" data-link>
          <i class="fas fa-list"></i> Volver a la lista
        </a>
      </div>
      <div class="orien-admin-edit-status">
        <span class="orien-badge orien-badge-outline" id="userUid"
          >Cargando...</span
        >
        <span class="orien-badge orien-badge-primary" id="userStatusBadge"
          >Activo</span
        >
      </div>
    </div>

    <div class="orien-card">
      <div class="orien-card-content">
        <form class="orien-form" id="userForm">
          <div class="orien-form-section">
            <h3 class="orien-form-section-title">Foto de perfil</h3>
            <div class="orien-avatar-container">
              <div class="orien-avatar-preview" id="avatarPreview">
                <i class="fas fa-user-circle"></i>
              </div>
              <div class="orien-avatar-upload">
                <div
                  class="orien-upload-area orien-upload-area-sm"
                  id="avatarUpload"
                >
                  <i class="fas fa-cloud-upload-alt"></i>
                  <span>Cambiar foto</span>
                  <input type="file" accept="image/*" style="display: none" />
                </div>
                <button
                  type="button"
                  id="removeAvatarBtn"
                  class="orien-btn orien-btn-sm orien-btn-outline"
                  style="color: #dc3545; border-color: #dc3545"
                >
                  <i class="fas fa-trash"></i> Eliminar
                </button>
              </div>
            </div>
            <input type="hidden" name="fotoURL" id="fotoURL" />
          </div>

          <div class="orien-form-section">
            <h3 class="orien-form-section-title">Información de la cuenta</h3>
            <div class="orien-form-group">
              <label class="orien-label">Correo electrónico</label>
              <input
                type="email"
                name="email"
                class="orien-input"
                readonly
                disabled
              />
            </div>
            <div class="orien-form-group">
              <label class="orien-label">Nueva contraseña</label>
              <input
                type="password"
                name="new_password"
                class="orien-input"
                placeholder="Dejar vacío para mantener"
              />
            </div>
            <div class="orien-form-group">
              <label class="orien-label">Confirmar contraseña</label>
              <input
                type="password"
                name="confirm_password"
                class="orien-input"
                placeholder="Confirmar nueva contraseña"
              />
            </div>
          </div>

          <div class="orien-form-section">
            <h3 class="orien-form-section-title">Información personal</h3>
            <div class="orien-form-row">
              <div class="orien-form-group" style="flex: 1">
                <label class="orien-label">Nombre</label>
                <input type="text" name="nombre" class="orien-input" required />
              </div>
              <div class="orien-form-group" style="flex: 1">
                <label class="orien-label">Apellidos</label>
                <input
                  type="text"
                  name="apellidos"
                  class="orien-input"
                  required
                />
              </div>
            </div>
          </div>

          <div class="orien-form-section">
            <h3 class="orien-form-section-title">Rol y permisos</h3>
            <div class="orien-form-group">
              <label class="orien-label">Rol de usuario</label>
              <select name="cargo" class="orien-select">
                <option value="colaborador">Colaborador</option>
                <option value="admin">Administrador</option>
              </select>
            </div>
            <div class="orien-form-group">
              <label class="orien-label">Estado</label>
              <div class="orien-radio-group">
                <label class="orien-radio">
                  <input type="radio" name="status" value="active" /> Activo
                </label>
                <label class="orien-radio">
                  <input type="radio" name="status" value="inactive" /> Inactivo
                </label>
              </div>
            </div>
          </div>

          <div class="orien-admin-version-info" id="auditInfo">
            <i class="fas fa-history"></i> Cargando información...
          </div>

          <div class="orien-form-actions">
            <a href="/usersList" class="orien-btn orien-btn-secondary" data-link
              >Cancelar</a
            >
            <button type="submit" class="orien-btn orien-btn-primary">
              Actualizar Usuario
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
