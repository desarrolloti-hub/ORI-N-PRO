<div class="orien-banner">
  <div class="orien-banner-overlay"></div>
  <div class="orien-banner-content">
    <h1 class="orien-banner-title">Editar Carrusel</h1>
    <p class="orien-banner-subtitle">Modifica el conjunto de slides</p>
  </div>
</div>
<br />
<div class="orien-admin-carousels-edit">
  <div class="orien-admin-edit-container">
    <div class="orien-admin-edit-nav">
      <div class="orien-admin-edit-nav-left">
        <a href="/adminDashboard" class="orien-admin-nav-link" data-link>
          <i class="fas fa-arrow-left"></i> Panel de Control
        </a>
        <a href="/carouselsList" class="orien-admin-nav-link" data-link>
          <i class="fas fa-list"></i> Volver a la lista
        </a>
      </div>
      <div class="orien-admin-edit-status">
        <span class="orien-badge orien-badge-outline" id="carouselId"
          >Cargando...</span
        >
      </div>
    </div>

    <div class="orien-card">
      <div class="orien-card-content">
        <form class="orien-form" id="carouselForm">
          <div class="orien-form-section">
            <h3 class="orien-form-section-title">Información del carrusel</h3>
            <div class="orien-form-group">
              <label class="orien-label">Nombre *</label>
              <input type="text" name="nombre" class="orien-input" required />
            </div>
            <br>
            <div class="orien-form-group">
              <label class="orien-label">Descripción</label>
              <textarea
                name="descripcion"
                class="orien-input orien-textarea"
                rows="2"
              ></textarea>
            </div>
          </div>

          <div class="orien-form-section">
            <h3 class="orien-form-section-title">Slides</h3>
            <div id="slidesContainer"></div>
            <button
              type="button"
              id="addSlideBtn"
              class="orien-btn orien-btn-outline"
              style="margin-top: 15px"
            >
              <i class="fas fa-plus"></i> Agregar slide
            </button>
          </div>

          <div class="orien-form-actions">
            <button
              type="button"
              class="orien-btn orien-btn-outline"
              id="deleteBtn"
              style="margin-right: auto; color: #dc3545; border-color: #dc3545"
            >
              <i class="fas fa-trash"></i> Eliminar carrusel
            </button>
            <a
              href="/carouselsList"
              class="orien-btn orien-btn-secondary"
              data-link
              >Cancelar</a
            >
            <button type="submit" class="orien-btn orien-btn-primary">
              Actualizar Carrusel
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
