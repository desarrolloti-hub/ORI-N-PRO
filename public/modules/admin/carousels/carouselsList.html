<div class="orien-banner">
  <div class="orien-banner-overlay"></div>
  <div class="orien-banner-content">
    <h1 class="orien-banner-title">Gestión de Carruseles</h1>
    <p class="orien-banner-subtitle">
      Administra los conjuntos de slides del carrusel principal
    </p>
  </div>
</div>

<div class="orien-section">
  <div class="orien-admin-list-header">
    <a href="/adminDashboard" class="orien-admin-nav-link" data-link>
      <i class="fas fa-arrow-left"></i> Panel de Control
    </a>
    <a href="/carouselsCreate" class="orien-btn orien-btn-primary" data-link>
      <i class="fas fa-plus"></i> Nuevo Carrusel
    </a>
  </div>

  <div class="orien-admin-search-bar">
    <div class="orien-admin-search-input">
      <i class="fas fa-search"></i>
      <input
        type="text"
        class="orien-input"
        id="searchCarousels"
        placeholder="Buscar carruseles..."
      />
    </div>
  </div>

  <div class="orien-table-container">
    <table class="orien-table" id="carouselsTable">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Slides</th>
          <th>Estado</th>
          <th>Fecha creación</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5" style="text-align: center">Cargando...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Contenedor de paginación -->
  <div id="paginationControls" class="orien-pagination"></div>
</div>
