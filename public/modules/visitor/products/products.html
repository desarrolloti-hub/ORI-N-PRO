<!-- Products Hero -->
<div class="orien-banner">
  <div class="orien-banner-overlay"></div>
  <div class="orien-banner-content">
    <h1 class="orien-banner-title">Nuestros Productos</h1>
    <p class="orien-banner-subtitle">
      Tecnología de vanguardia para eventos, entretenimiento y espacios
      profesionales
    </p>
  </div>
</div>
<br />
<div class="orien-products-layout">
  <!-- Sidebar Filters -->
  <aside class="orien-products-sidebar">
    <h3 class="orien-sidebar-title">Filtros</h3>

    <div class="orien-filter-group">
      <div class="orien-filter-title">Categoría</div>
      <div class="orien-filter-options"></div>
    </div>

    <div class="orien-filter-group">
      <div class="orien-filter-title">Tipo</div>
      <div class="orien-filter-options">
        <label class="orien-filter-option">
          <input type="checkbox" value="venta" class="filter-type" /> Venta
        </label>
        <label class="orien-filter-option">
          <input type="checkbox" value="renta" class="filter-type" /> Renta
        </label>
      </div>
    </div>

    <div class="orien-filter-group">
      <div class="orien-filter-title">Ofertas</div>
      <div class="orien-filter-options">
        <label class="orien-filter-option">
          <input type="checkbox" id="filterOferta" class="filter-oferta" />
          Mostrar solo productos en oferta
        </label>
      </div>
    </div>

    <a href="#" class="orien-filter-clear" id="clearFilters">Limpiar filtros</a>
  </aside>

  <!-- Products Main Content -->
  <main>
    <div class="orien-products-info">
      <div class="orien-products-count" id="productsCount">
        Cargando productos...
      </div>
      <div class="orien-products-sort">
        <label>Ordenar por:</label>
        <select id="sortProducts">
          <option value="default">Destacados</option>
          <option value="name-asc">Nombre A-Z</option>
          <option value="name-desc">Nombre Z-A</option>
          <option value="price-asc">Precio: menor a mayor</option>
          <option value="price-desc">Precio: mayor a menor</option>
          <option value="destacados">Más populares</option>
        </select>
      </div>
    </div>

    <div class="orien-card-grid" id="productsGrid">
      <div class="orien-loading">
        <div class="orien-spinner"></div>
        <p>Cargando productos...</p>
      </div>
    </div>

    <!-- Contenedor de paginación (dinámico) -->
    <div id="paginationControls" class="orien-pagination"></div>
  </main>
</div>

<!-- Quick View Modal (ya no se usa, pero se mantiene por si acaso) -->
<div class="orien-modal-overlay" id="quickViewModal">
  <div class="orien-modal orien-modal-lg">
    <div class="orien-modal-header">
      <h3 class="orien-modal-title" id="modalTitle">Detalle del Producto</h3>
      <button class="orien-modal-close" id="closeModal">✕</button>
    </div>
    <div class="orien-modal-body" id="modalBody"></div>
    <div class="orien-modal-footer">
      <button class="orien-btn orien-btn-secondary" id="modalCloseBtn">
        Cerrar
      </button>
      <button class="orien-btn orien-btn-primary" id="modalContactBtn">
        Solicitar cotización
      </button>
    </div>
  </div>
</div>
