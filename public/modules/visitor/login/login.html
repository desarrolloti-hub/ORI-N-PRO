<!-- Login Hero Banner -->
<div class="orien-banner">
    <div class="orien-banner-overlay"></div>
    <div class="orien-banner-content">
        <h1 class="orien-banner-title">Panel de Acceso</h1>
        <p class="orien-banner-subtitle">Accede a tu cuenta para gestionar el sistema</p>
    </div>
</div>

<div class="orien-login-container">
    <div class="orien-login-card">
        <div class="orien-login-header">
            <div class="orien-login-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2>Bienvenido</h2>
            <p>Ingresa tus credenciales para acceder</p>
        </div>
        
        <div class="orien-login-body">
            <form id="loginForm" class="orien-form">
                <div class="orien-form-group">
                    <label class="orien-label">Correo electrónico</label>
                    <input type="email" class="orien-input" placeholder="correo@orienpro.com" required>
                </div>
                
                <div class="orien-form-group">
                    <label class="orien-label">Contraseña</label>
                    <input type="password" class="orien-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="orien-btn orien-btn-primary orien-btn-block">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>
        </div>
    </div>
</div>
